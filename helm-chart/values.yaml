# Default values for retail-mesh Helm chart
# This follows the architecture and fixes from the Gemini refactor session.

global:
  namespace: retail-mesh
  imagePullPolicy: Always

# --- DATABASES ---

postgres:
  image: postgres:15-alpine
  port: 5432
  user: retail_user
  password: retail_password
  database: retail_db
  # The init SQL is handled in the template via ConfigMap

redis:
  image: redis:7-alpine
  port: 6379

mongodb:
  image: mongo:latest
  port: 27017
  database: retail_db

# --- MICROSERVICES ---

images:
  frontend: awezkhan6899/retail-frontend:latest
  orderService: awezkhan6899/retail-order:latest
  inventoryService: awezkhan6899/retail-inventory:latest
  paymentService: awezkhan6899/retail-payment:latest
  loyaltyService: awezkhan6899/retail-loyalty:latest
  notificationService: awezkhan6899/retail-notification:latest
  adminFrontend: awezkhan6899/retail-admin-frontend:latest

ports:
  frontend: 3000
  orderService: 5000
  inventoryService: 5001
  paymentService: 5002
  notificationService: 5003
  loyaltyService: 5004
  adminFrontend: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
