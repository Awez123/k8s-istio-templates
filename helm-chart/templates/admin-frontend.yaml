apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-frontend
  template:
    metadata:
      labels:
        app: admin-frontend
        version: v1
    spec:
      containers:
      - name: admin-frontend
        image: {{ .Values.images.adminFrontend }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.ports.adminFrontend }}
          protocol: TCP
        env:
        - name: PORT
          value: "{{ .Values.ports.adminFrontend }}"
        - name: ORDER_SERVICE_HOST
          value: "order-service"
        - name: ORDER_SERVICE_PORT_VAL
          value: "{{ .Values.ports.orderService }}"
        - name: INVENTORY_SERVICE_HOST
          value: "inventory-service"
        - name: INVENTORY_SERVICE_PORT_VAL
          value: "{{ .Values.ports.inventoryService }}"
        - name: PAYMENT_SERVICE_HOST
          value: "payment-service"
        - name: PAYMENT_SERVICE_PORT_VAL
          value: "{{ .Values.ports.paymentService }}"
        - name: LOYALTY_SERVICE_HOST
          value: "loyalty-service"
        - name: LOYALTY_SERVICE_PORT_VAL
          value: "{{ .Values.ports.loyaltyService }}"
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.ports.adminFrontend }}
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.ports.adminFrontend }}
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: admin-frontend
spec:
  type: ClusterIP
  selector:
    app: admin-frontend
  ports:
  - name: http
    protocol: TCP
    port: {{ .Values.ports.adminFrontend }}
    targetPort: {{ .Values.ports.adminFrontend }}
