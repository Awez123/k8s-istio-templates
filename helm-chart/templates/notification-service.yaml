apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  selector:
    matchLabels: {app: notification-service}
  template:
    metadata:
      labels: {app: notification-service}
    spec:
      containers:
      - name: notification-service
        image: {{ .Values.images.notificationService }}
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  ports: [{port: {{ .Values.ports.notificationService }}}]
  selector: {app: notification-service}
