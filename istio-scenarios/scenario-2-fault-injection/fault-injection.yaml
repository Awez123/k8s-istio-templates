apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: inventory-fault-injection
  namespace: retail-mesh
spec:
  hosts:
  - inventory-service
  http:
  - fault:
      delay:
        percentage:
          value: 100
        fixedDelay: 5s
    route:
    - destination:
        host: inventory-service
        port:
          number: 5001
