apiVersion: v1
kind: Namespace
metadata:
  name: retail-mesh
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: retail-mesh
data:
  init.sql: |
    -- Ensure the user exists
    DO $$ 
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'retail_user') THEN
        CREATE ROLE retail_user WITH LOGIN PASSWORD 'retail_password';
      END IF;
    END $$;
    
    -- CREATE THE EXACT DB THE GO CODE WANTS: retail_db
    SELECT 'CREATE DATABASE retail_db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'retail_db')\gexec
    
    GRANT ALL PRIVILEGES ON DATABASE retail_db TO retail_user;
    \connect retail_db;
    GRANT ALL PRIVILEGES ON SCHEMA public TO retail_user;
---
# --- DATABASES ---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: retail-mesh
spec:
  ports: [{port: 5432}]
  selector: {app: postgres}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: retail-mesh
spec:
  selector:
    matchLabels: {app: postgres}
  template:
    metadata:
      labels: {app: postgres}
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_PASSWORD
          value: "password"
        - name: POSTGRES_DB
          value: "retail_db" # Matches Go Code
        volumeMounts:
        - name: init-sql
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: init-sql
        configMap: {name: postgres-init}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: retail-mesh
spec:
  ports: [{port: 6379}]
  selector: {app: redis}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: retail-mesh
spec:
  selector:
    matchLabels: {app: redis}
  template:
    metadata:
      labels: {app: redis}
    spec:
      containers:
      - name: redis
        image: redis:7
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: retail-mesh
spec:
  ports: [{port: 27017}]
  selector: {app: mongodb}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: retail-mesh
spec:
  selector:
    matchLabels: {app: mongodb}
  template:
    metadata:
      labels: {app: mongodb}
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
---
# --- MICROSERVICES ---

# 1. Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: retail-mesh
spec:
  selector:
    matchLabels: {app: frontend}
  template:
    metadata:
      labels: {app: frontend}
    spec:
      containers:
      - name: frontend
        image: awezkhan6899/retail-frontend:latest
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT # Prevents the 'too many colons' error
          value: "6379"
        - name: ORDER_SERVICE_HOST
          value: "order-service"
        - name: ORDER_SERVICE_PORT_VAL
          value: "5000"
        - name: INVENTORY_SERVICE_HOST
          value: "inventory-service"
        - name: INVENTORY_SERVICE_PORT_VAL
          value: "5001"
        - name: PAYMENT_SERVICE_HOST
          value: "payment-service"
        - name: PAYMENT_SERVICE_PORT_VAL
          value: "5002"
        - name: LOYALTY_SERVICE_HOST
          value: "loyalty-service"
        - name: LOYALTY_SERVICE_PORT_VAL
          value: "5004"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: retail-mesh
spec:
  ports: [{port: 3000}]
  selector: {app: frontend}
---

