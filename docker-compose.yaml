version: '3.8'

services:
  # ==================== DATABASES ====================
  postgres:
    image: postgres:15-alpine
    container_name: retail-postgres
    hostname: postgres
    environment:
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password
      POSTGRES_DB: retail_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - retail-mesh

  redis:
    image: redis:7-alpine
    container_name: retail-redis
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - retail-mesh

  mongodb:
    image: mongo:latest
    container_name: retail-mongodb
    hostname: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - retail-mesh

  # ==================== MICROSERVICES ====================
  order-service:
    build:
      context: ./microservices/order-service
      dockerfile: Dockerfile
    container_name: retail-order
    hostname: order-service
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: retail_user
      DB_PASSWORD: retail_password
      DB_NAME: retail_db
      INVENTORY_SERVICE_HOST: inventory-service
      INVENTORY_SERVICE_PORT: 5001
      PAYMENT_SERVICE_HOST: payment-service
      PAYMENT_SERVICE_PORT_VAL: 5002
    depends_on:
      postgres:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    networks:
      - retail-mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./microservices/frontend
      dockerfile: Dockerfile
    container_name: retail-frontend
    hostname: frontend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ORDER_SERVICE_HOST: order-service
      ORDER_SERVICE_PORT_VAL: 5000
      INVENTORY_SERVICE_HOST: inventory-service
      INVENTORY_SERVICE_PORT_VAL: 5001
      PAYMENT_SERVICE_HOST: payment-service
      PAYMENT_SERVICE_PORT_VAL: 5002
      LOYALTY_SERVICE_HOST: loyalty-service
      LOYALTY_SERVICE_PORT_VAL: 5004
    depends_on:
      redis:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - retail-mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  inventory-service:
    build:
      context: ./microservices/inventory-service
      dockerfile: Dockerfile
    container_name: retail-inventory
    hostname: inventory-service
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DBNAME: retail_db
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - retail-mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  payment-service:
    build:
      context: ./microservices/payment-service
      dockerfile: Dockerfile
    container_name: retail-payment
    hostname: payment-service
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      NOTIFICATION_SERVICE_HOST: notification-service
      NOTIFICATION_SERVICE_PORT_VAL: 5003
      LOYALTY_SERVICE_HOST: loyalty-service
      LOYALTY_SERVICE_PORT_VAL: 5004
    depends_on:
      notification-service:
        condition: service_healthy
    networks:
      - retail-mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  notification-service:
    build:
      context: ./microservices/notification-service
      dockerfile: Dockerfile
    container_name: retail-notification
    hostname: notification-service
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
    networks:
      - retail-mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  loyalty-service:
    build:
      context: ./microservices/loyalty-service
      dockerfile: Dockerfile
    container_name: retail-loyalty
    hostname: loyalty-service
    ports:
      - "5004:5004"
    environment:
      PORT: 5004
    networks:
      - retail-mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  admin-frontend:
    build:
      context: ./microservices/admin-frontend
      dockerfile: Dockerfile
    container_name: retail-admin
    hostname: admin-frontend
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      ORDER_SERVICE_HOST: order-service
      ORDER_SERVICE_PORT_VAL: 5000
      INVENTORY_SERVICE_HOST: inventory-service
      INVENTORY_SERVICE_PORT_VAL: 5001
      PAYMENT_SERVICE_HOST: payment-service
      PAYMENT_SERVICE_PORT_VAL: 5002
      LOYALTY_SERVICE_HOST: loyalty-service
      LOYALTY_SERVICE_PORT_VAL: 5004
    networks:
      - retail-mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mongodb_data:
    driver: local

networks:
  retail-mesh:
    driver: bridge
