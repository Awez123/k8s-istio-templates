apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: retail-mesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: retail-mesh
spec:
  type: ClusterIP
  ports:
    - port: 27017
  selector:
    app: mongodb
