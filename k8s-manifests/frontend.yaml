apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: retail-mesh
spec:
  selector:
    matchLabels: {app: frontend}
  template:
    metadata:
      labels: {app: frontend}
    spec:
      containers:
      - name: frontend
        image: awezkhan6899/retail-frontend:latest
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: ORDER_SERVICE_HOST
          value: "order-service"
        - name: ORDER_SERVICE_PORT_VAL
          value: "5000"
        - name: INVENTORY_SERVICE_HOST
          value: "inventory-service"
        - name: INVENTORY_SERVICE_PORT_VAL
          value: "5001"
        - name: PAYMENT_SERVICE_HOST
          value: "payment-service"
        - name: PAYMENT_SERVICE_PORT_VAL
          value: "5002"
        - name: LOYALTY_SERVICE_HOST
          value: "loyalty-service"
        - name: LOYALTY_SERVICE_PORT_VAL
          value: "5004"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: retail-mesh
spec:
  ports: [{port: 3000}]
  selector: {app: frontend}
