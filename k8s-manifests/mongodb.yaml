apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: retail-mesh
spec:
  ports: [{port: 27017}]
  selector: {app: mongodb}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: retail-mesh
spec:
  selector:
    matchLabels: {app: mongodb}
  template:
    metadata:
      labels: {app: mongodb}
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
