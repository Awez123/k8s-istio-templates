apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: retail-mesh
data:
  init.sql: |
    -- Ensure the user exists
    DO $$ 
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'retail_user') THEN
        CREATE ROLE retail_user WITH LOGIN PASSWORD 'retail_password';
      END IF;
    END $$;
    
    -- CREATE THE EXACT DB THE GO CODE WANTS: retail_db
    SELECT 'CREATE DATABASE retail_db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'retail_db')\gexec
    
    GRANT ALL PRIVILEGES ON DATABASE retail_db TO retail_user;
    \connect retail_db;
    GRANT ALL PRIVILEGES ON SCHEMA public TO retail_user;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: retail-mesh
spec:
  ports: [{port: 5432}]
  selector: {app: postgres}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: retail-mesh
spec:
  selector:
    matchLabels: {app: postgres}
  template:
    metadata:
      labels: {app: postgres}
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_PASSWORD
          value: "password"
        - name: POSTGRES_DB
          value: "retail_db"
        volumeMounts:
        - name: init-sql
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: init-sql
        configMap: {name: postgres-init}
