apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: retail-mesh
spec:
  selector:
    matchLabels: {app: payment-service}
  template:
    metadata:
      labels: {app: payment-service}
    spec:
      containers:
      - name: payment-service
        image: awezkhan6899/retail-payment:latest
        env:
        - name: NOTIFICATION_SERVICE_HOST
          value: "notification-service"
        - name: NOTIFICATION_SERVICE_PORT_VAL
          value: "5003"
        - name: LOYALTY_SERVICE_HOST
          value: "loyalty-service"
        - name: LOYALTY_SERVICE_PORT_VAL
          value: "5004"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: retail-mesh
spec:
  ports: [{port: 5002}]
  selector: {app: payment-service}
